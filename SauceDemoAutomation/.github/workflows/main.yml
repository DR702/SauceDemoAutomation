name: Selenium TestNG Automation Project2

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-${{ runner.os }}-

      - name: Install Chromium
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser

      - name: Verify Chromium installation
        run: chromium-browser --version

      # IMPORTANT PART — correct Maven directory
      - name: Build project
        working-directory: SauceDemoAutomation
        run: mvn clean compile

      - name: Run TestNG tests
        working-directory: SauceDemoAutomation
        run: mvn test --fail-at-end

      - name: Upload TestNG Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: testng-reports
          path: SauceDemoAutomation/target/surefire-reports

      - name: Upload Extent Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: extent-report
          path: SauceDemoAutomation/Report/Extent.html

      - name: Download Artifacts
        if: always()
        run: |
          mkdir -p reports
          cp -r SauceDemoAutomation/target/surefire-reports reports/ 2>/dev/null || true
          cp SauceDemoAutomation/Report/Extent.html reports/ 2>/dev/null || true

      - name: Send Email with Reports
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.EMAIL_SERVER }}
          server_port: ${{ secrets.EMAIL_PORT }}
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: TestNG Automation Test Results - ${{ github.repository }} - ${{ github.run_number }}
          to: ajeetgaurav100@gmail.com
          from: ${{ secrets.EMAIL_FROM }}
          body: |
            Hi,

            TestNG Automation tests have completed for repository: ${{ github.repository }}
            
            Run Number: ${{ github.run_number }}
            Commit SHA: ${{ github.sha }}
            Branch: ${{ github.ref }}
            Actor: ${{ github.actor }}
            
            Test Artifacts:
            - TestNG Reports: surefire-reports directory
            - Extent Report: Extent.html
            
            Please find the attached test reports.
            
            Best regards,
            GitHub Actions
          attachments: reports/*
